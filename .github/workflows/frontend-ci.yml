name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "viewer/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "viewer/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: viewer/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm vitest run

      - name: Build
        run: pnpm build

  playwright-chromium:
    name: Playwright Chromium layered
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: viewer/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Chromium desktop smoke/a11y/cross-browser/learn-task
        run: |
          pnpm exec playwright test \
            tests/e2e/smoke.spec.ts \
            tests/e2e/a11y.spec.ts \
            tests/e2e/cross-browser.spec.ts \
            tests/e2e/learn-task.spec.ts \
            --project=chromium-desktop \
            --reporter=line

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: frontend-playwright-results
          path: |
            viewer/test-results
            viewer/playwright-report
          if-no-files-found: ignore
