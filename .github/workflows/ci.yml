name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python with current Homebrew SQLite
        run: |
          brew install python@3.12
          echo "$(brew --prefix python@3.12)/bin" >> "$GITHUB_PATH"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: python3.12 -c "import sqlite3; print(sqlite3.sqlite_version)"
      - run: uv sync --locked --dev --python python3.12
      - run: uv run pytest tests/unit -q
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run pyright
      - run: uv build --wheel
      - run: uv run python -m ahadiff --version
