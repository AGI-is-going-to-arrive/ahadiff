name: Backend CI

on:
  pull_request:
    branches: [main]
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend CI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-py311
            os: ubuntu-latest
            python_version: "3.11"
          - name: ubuntu-py312
            os: ubuntu-latest
            python_version: "3.12"
          - name: macos-py312
            os: macos-latest
            python_version: "3.12"
    env:
      PYTHON_VERSION: ${{ matrix.python_version }}
      NODE_VERSION: "22"
      PNPM_VERSION: "10.33.0"
      SQLITE_AUTOCONF_VERSION: "3510300"
      SQLITE_DOWNLOAD_YEAR: "2026"
    steps:
      - uses: actions/checkout@v4

      - name: Install Python with current Homebrew SQLite
        if: runner.os == 'macOS'
        run: |
          brew install python@${PYTHON_VERSION}
          echo "$(brew --prefix python@${PYTHON_VERSION})/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v5
        if: runner.os == 'Linux'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SQLite runtime on Linux
        if: runner.os == 'Linux'
        run: |
          sqlite_url="https://www.sqlite.org/${SQLITE_DOWNLOAD_YEAR}/sqlite-autoconf-${SQLITE_AUTOCONF_VERSION}.tar.gz"
          curl -fsSLo "$RUNNER_TEMP/sqlite.tar.gz" "$sqlite_url" || \
            curl -fsSLo "$RUNNER_TEMP/sqlite.tar.gz" \
              "https://www.sqlite.org/2025/sqlite-autoconf-${SQLITE_AUTOCONF_VERSION}.tar.gz"
          tar -xzf "$RUNNER_TEMP/sqlite.tar.gz" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/sqlite-autoconf-${SQLITE_AUTOCONF_VERSION}"
          ./configure --prefix="$RUNNER_TEMP/sqlite" --disable-static --fts5
          make -j"$(nproc)"
          make install
          sqlite_lib="$RUNNER_TEMP/sqlite/lib/libsqlite3.so"
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/sqlite/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "LD_PRELOAD=$sqlite_lib${LD_PRELOAD:+:$LD_PRELOAD}" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify Python SQLite runtime on Linux
        if: runner.os == 'Linux'
        run: python -c "import sqlite3; print(sqlite3.sqlite_version, sqlite3.__file__); c=sqlite3.connect(':memory:'); c.execute('CREATE VIRTUAL TABLE t USING fts5(x)'); print('fts5 ok')"
      - name: Show Python SQLite runtime on macOS
        if: runner.os == 'macOS'
        run: python -c "import sqlite3; print(sqlite3.sqlite_version, sqlite3.__file__)"
      - run: uv sync --locked --dev --python ${{ env.PYTHON_VERSION }}
      - run: uv run pytest tests/unit tests/eval tests/integration/test_learn_pipeline.py -q --tb=long
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run pyright
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: viewer/pnpm-lock.yaml
      - name: Build viewer
        working-directory: viewer
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - run: uv build --wheel
      - run: uv run python -m ahadiff --version

  windows-runtime:
    name: Windows Runtime Guard
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.11"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - shell: bash
        run: python -c "import sqlite3; print(sqlite3.sqlite_version)"
      - shell: bash
        run: uv sync --locked --dev --python ${{ env.PYTHON_VERSION }}
      - shell: bash
        run: |
          uv run pytest -q --tb=long \
            tests/unit/test_cross_platform_static.py \
            tests/unit/test_core_utils.py::TestSafeSqliteConnect::test_windows_read_only_uri_preserves_drive_letter \
            tests/unit/test_core_utils.py::TestSafeSqliteConnect::test_rejects_ntfs_reparse_point_on_windows \
            tests/unit/test_provider.py::test_usage_db_rejects_unsupported_sqlite_runtime \
            tests/unit/test_serve_app.py::test_bounded_finalized_artifact_digest_rejects_reparse_directory \
            tests/unit/test_stage1_task1.py::test_repo_write_lock_rejects_windows_reparse_point \
            tests/unit/test_stage1_task1.py::test_unlock_repo_write_lock_rejects_windows_reparse_point \
            tests/unit/test_stage1_task1.py::test_workspace_identity_key_casefolds_on_windows \
            tests/unit/test_stage1_task1.py::test_cli_doctor_exits_non_zero_when_sqlite_gate_fails
