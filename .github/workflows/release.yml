name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  gate-linux:
    name: Release Gate (Linux)
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"
      SQLITE_AUTOCONF_VERSION: "3510300"
      SQLITE_DOWNLOAD_YEAR: "2026"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SQLite runtime
        run: |
          sqlite_url="https://www.sqlite.org/${SQLITE_DOWNLOAD_YEAR}/sqlite-autoconf-${SQLITE_AUTOCONF_VERSION}.tar.gz"
          curl -fsSLo "$RUNNER_TEMP/sqlite.tar.gz" "$sqlite_url" || \
            curl -fsSLo "$RUNNER_TEMP/sqlite.tar.gz" \
              "https://www.sqlite.org/2025/sqlite-autoconf-${SQLITE_AUTOCONF_VERSION}.tar.gz"
          tar -xzf "$RUNNER_TEMP/sqlite.tar.gz" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/sqlite-autoconf-${SQLITE_AUTOCONF_VERSION}"
          ./configure --prefix="$RUNNER_TEMP/sqlite" --disable-static
          make -j"$(nproc)"
          make install
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/sqlite/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --locked --dev --python python3.12

      - name: Gate - tests + coverage
        run: uv run pytest --cov=src/ahadiff --cov-report=term-missing --cov-fail-under=85 tests -q --tb=long

      - name: Gate - Graphify performance
        run: uv run python benchmarks/graphify/bench_graphify.py

      - name: Gate - lint
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Gate - type check
        run: uv run pyright

      - name: Gate - wheel build
        run: uv build --wheel

      - name: Gate - CLI smoke
        run: |
          uv run python -m ahadiff --version
          uv run python -m ahadiff doctor

      - name: Gate - wheel install smoke
        run: |
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          source "$RUNNER_TEMP/wheel-smoke/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          ahadiff --version
          ahadiff doctor --repo-root .
          ahadiff learn --help > /dev/null

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  gate-windows-runtime:
    name: Release Gate (Windows Runtime)
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.11"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - shell: bash
        run: python -c "import sqlite3; print(sqlite3.sqlite_version)"
      - shell: bash
        run: uv sync --locked --dev --python ${{ env.PYTHON_VERSION }}
      - shell: bash
        run: |
          uv run pytest -q --tb=long \
            tests/unit/test_cross_platform_static.py \
            tests/unit/test_core_utils.py::TestSafeSqliteConnect::test_windows_read_only_uri_preserves_drive_letter \
            tests/unit/test_core_utils.py::TestSafeSqliteConnect::test_rejects_ntfs_reparse_point_on_windows \
            tests/unit/test_provider.py::test_usage_db_rejects_unsupported_sqlite_runtime \
            tests/unit/test_serve_app.py::test_bounded_finalized_artifact_digest_rejects_reparse_directory \
            tests/unit/test_stage1_task1.py::test_repo_write_lock_rejects_windows_reparse_point \
            tests/unit/test_stage1_task1.py::test_unlock_repo_write_lock_rejects_windows_reparse_point \
            tests/unit/test_stage1_task1.py::test_workspace_identity_key_casefolds_on_windows \
            tests/unit/test_stage1_task1.py::test_cli_doctor_exits_non_zero_when_sqlite_gate_fails

  publish:
    needs: [gate-linux, gate-windows-runtime]
    if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
